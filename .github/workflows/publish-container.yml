name: Build and publish container

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-container-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  APP_DIRECTORY: Halo Email Integration

jobs:
  build-and-publish:
    name: Verify, build, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate publishing configuration
        shell: bash
        env:
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
        run: |
          if [[ -z "$PUBLIC_BASE_URL" ]]; then
            echo "::error::Create the repository Actions variable PUBLIC_BASE_URL with the deployed HTTPS origin."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ env.APP_DIRECTORY }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.APP_DIRECTORY }}
        run: npm ci

      - name: Lint
        working-directory: ${{ env.APP_DIRECTORY }}
        run: npm run lint

      - name: Run authentication tests
        working-directory: ${{ env.APP_DIRECTORY }}
        run: npm run test:auth

      - name: Run send runtime tests
        working-directory: ${{ env.APP_DIRECTORY }}
        run: npm run test:send-runtime

      - name: Build production assets
        working-directory: ${{ env.APP_DIRECTORY }}
        env:
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
        run: npm run build

      - name: Test built send runtime
        working-directory: ${{ env.APP_DIRECTORY }}
        run: npm run test:send-runtime:built

      - name: Validate production manifest
        working-directory: ${{ env.APP_DIRECTORY }}
        run: npx office-addin-manifest validate dist/manifest.xml

      - name: Read application version
        id: version
        working-directory: ${{ env.APP_DIRECTORY }}
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
        with:
          driver: docker-container

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: latest=false
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=latest-beta
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: ./${{ env.APP_DIRECTORY }}
          file: ./${{ env.APP_DIRECTORY }}/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            PUBLIC_BASE_URL=${{ vars.PUBLIC_BASE_URL }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest published image
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Summarize publication
        shell: bash
        run: |
          echo "### Published container" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.metadata.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Digest: \`${{ steps.push.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
